<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
</head>
<body>
    <h1>Tabela com CSS Inline</h1>
<table style="width: 100%; border-collapse: collapse; border:2px solid #000;">
    <tr>
        <th style="border:1px solid #000; ">ID</th>
        <th style="border:1px solid #000; ">Nome</th>
        <th style="border:1px solid #000; ">Idade</th>
        <th style="border:1px solid #000; ">Cidade</th>
        <th style="border:1px solid #000; ">Estado</th>
        <th style="border:1px solid #000; ">Telefone</th>
        <th style="border:1px solid #000; ">E-mail</th>
        <th style="border:1px solid #000; ">Profissão</th>
        <th style="border:1px solid #000; ">Empresa</th>
        <th style="border:1px solid #000; ">Data de Admissão</th>
    </tr>
    </table>
</body>
</html>
