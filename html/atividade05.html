<!DOCTYPE html>
<html lang="Pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela usando CSS Interno</title>
    <style>
        table{
            width: 100%;
            border-collapse: collapse;
        }
        th{
            border: 2px solid rosybrown;
            padding: 10px;
            background-color: white;
            color: rosybrown;
        }
        h1{
          border: 2px solid rosybrown;
          padding: 10px;
          background-color: white;
          color: red;  
        }
    </style>
</head>
<body>
<h1> Tabela usando CSS Interno</h1>
    <table>
        <tr>
    <th>Código</th>
    <th>Produto</th>
    <th>Categoria</th>
    <th>Quatidade</th>
    <th>Preço Unitário</th>
    <th>Preço Total</th>
    <th>Fornecedor</th>
    <th>Data de Compra</th>
    <th>"Data de Validade</th>
    <th>Status</th>
        </tr>
    </table>
     
</body>
</html>
