<!DOCTYPE html>
<html lang="Pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
    <style>
        table{
            width: 100%;
            border-collapse: collapse;
        }
        td,th{
            border: 1px solid black;
            padding: 20px;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 25px; 
        }
        h1{
            color: blueviolet;
        }
    </style>
</head>
<body>
    <h1>CSS Interno</h1>
    <table>
        <tr>
            <th>Id</th>
            <th>Nome</th>
            <th>Cidade</th>
        </tr>
    </table>
</body>
</html>
