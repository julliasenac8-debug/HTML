<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabelat</title>
</head>
<body style="color: violet;"> <!--style que estabilizar a pagina, color -> é a cor da letra-->
    <h1 style= "font-size: 10px;">Tabela</h1> <!--style font size é o tamanho da letra-->
    <p style="text-align: justify;">Forma de organiza as informações, dados em uma estrutura de colunas e linhas.</p> <!--style text-align alinhamento do texto-->
    <table style="width: 100%;border-collapse: collapse; background-color: blanchedalmond;"> <!--Tabela-->
        <tr> <!--Linha da tabela-->
        <th style="border: 1px solid black;">Produto</th> <!--Títulos da tabela th-->
        <th style="border: 1px solid black;">Descrição</th>
        <th style="border: 1px solid black;">Preço</th>
        </tr>
        <tr>
            <td>Luva</td> <!--Descritivo sem negrito td-->
            <td>Latex</td>
            <td>R$10,00</td>
        </tr>
        <tr>
            <td>Farinha</td> <!--Descritivo sem negrito td-->
            <td>Fardo</td>
            <td>R$100,00</td>
        </tr>
    </table>
</body>
</html>
